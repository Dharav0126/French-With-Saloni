<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Cancelled — French with Saloni</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0A2342;--blue:#1355A0;--sky:#2E7FD9;--frost:#EEF5FF;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:var(--frost);color:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .card{background:#fff;border-radius:24px;padding:3.5rem;max-width:480px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(10,35,66,.12);}
    .icon{width:80px;height:80px;border-radius:50%;background:#FEE2E2;display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin:0 auto 1.5rem;}
    .title{font-family:'Libre Baskerville',serif;font-size:2rem;color:var(--navy);margin-bottom:.8rem;}
    .subtitle{font-size:1rem;color:#5E7A99;line-height:1.7;margin-bottom:2rem;}
    .btn{display:inline-block;background:var(--blue);color:#fff;padding:.9rem 2.5rem;border-radius:8px;font-size:.9rem;font-weight:700;text-decoration:none;transition:background .25s,transform .2s;margin:.5rem;}
    .btn:hover{background:var(--sky);transform:translateY(-2px);}
    .btn-outline{background:transparent;color:var(--blue);border:2px solid var(--blue);}
    .btn-outline:hover{background:var(--frost);}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">😕</div>
    <h1 class="title">Payment Cancelled</h1>
    <p class="subtitle">No worries — your payment was cancelled and you have not been charged. You can try again anytime or reach out to Saloni if you have any questions.</p>
    <div>
      <a href="/french-with-saloni.html#pricing" class="btn">Try Again</a>
      <a href="/french-with-saloni.html#contact" class="btn btn-outline">Contact Saloni</a>
    </div>
  </div>
</body>
</html>
