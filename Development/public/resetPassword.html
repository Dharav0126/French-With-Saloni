<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — French with Saloni</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0A2342;--blue:#1355A0;--sky:#2E7FD9;--pale:#D6E8FF;--frost:#EEF5FF;--gold:#F0C040;--muted:#5E7A99;--green:#10B981;--red:#EF4444;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,var(--navy),var(--blue));min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.3);}
    .brand{font-family:'Libre Baskerville',serif;font-size:1.2rem;color:var(--navy);margin-bottom:.3rem;}
    .brand span{color:var(--sky);font-style:italic;}
    .title{font-family:'Libre Baskerville',serif;font-size:1.5rem;color:var(--navy);margin:1.2rem 0 .4rem;}
    .sub{font-size:.85rem;color:var(--muted);margin-bottom:1.8rem;line-height:1.6;}
    .label{display:block;font-size:.78rem;font-weight:700;color:var(--navy);margin-bottom:.4rem;letter-spacing:.04em;}
    .input{width:100%;padding:.75rem 1rem;border:1.5px solid rgba(19,85,160,.15);border-radius:8px;font-size:.9rem;font-family:'Nunito',sans-serif;color:var(--navy);outline:none;margin-bottom:1rem;transition:border-color .25s;}
    .input:focus{border-color:var(--sky);}
    .btn{width:100%;padding:.9rem;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:background .25s;}
    .btn:hover{background:var(--sky);}
    .btn:disabled{opacity:.6;cursor:not-allowed;}
    .error{background:#FEE2E2;color:#991B1B;padding:.7rem 1rem;border-radius:6px;font-size:.82rem;margin-bottom:1rem;display:none;}
    .error.visible{display:block;}
    .success{background:#D1FAE5;color:#065F46;padding:.7rem 1rem;border-radius:6px;font-size:.82rem;margin-bottom:1rem;display:none;}
    .success.visible{display:block;}
    .back{text-align:center;margin-top:1.2rem;font-size:.82rem;color:var(--muted);}
    .back a{color:var(--sky);font-weight:600;text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">French with <span>Saloni</span></div>
    <div class="title">Reset Password</div>
    <div class="sub">Enter your new password below.</div>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>

    <div id="form-section">
      <label class="label">New Password</label>
      <input class="input" type="password" id="new-password" placeholder="At least 8 characters"/>
      <label class="label">Confirm Password</label>
      <input class="input" type="password" id="confirm-password" placeholder="Repeat your new password"/>
      <button class="btn" id="reset-btn" onclick="handleReset()">Update Password</button>
    </div>

    <div class="back"><a href="./index.html">← Back to home</a></div>
  </div>

  <script>
    const API = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
      ? 'http://localhost:3000'
      : window.location.origin

    // Get token from URL hash (Supabase sends it as #access_token=...)
    const hashParams = new URLSearchParams(window.location.hash.substring(1))
    const accessToken = hashParams.get('access_token')

    if (!accessToken) {
      document.getElementById('error').textContent = 'Invalid or expired reset link. Please request a new one.'
      document.getElementById('error').classList.add('visible')
      document.getElementById('form-section').style.display = 'none'
    }

    async function handleReset() {
      const newPassword     = document.getElementById('new-password').value
      const confirmPassword = document.getElementById('confirm-password').value
      const errEl           = document.getElementById('error')
      const successEl       = document.getElementById('success')

      errEl.classList.remove('visible')
      successEl.classList.remove('visible')

      if (!newPassword || !confirmPassword) {
        errEl.textContent = 'Please fill in both fields.'
        errEl.classList.add('visible')
        return
      }
      if (newPassword.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.'
        errEl.classList.add('visible')
        return
      }
      if (newPassword !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.'
        errEl.classList.add('visible')
        return
      }

      const btn = document.getElementById('reset-btn')
      btn.disabled = true
      btn.textContent = 'Updating...'

      try {
        const res  = await fetch(`${API}/auth/reset-password`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ accessToken, newPassword })
        })
        const data = await res.json()

        if (!res.ok) {
          errEl.textContent = data.error || 'Failed to reset password.'
          errEl.classList.add('visible')
        } else {
          document.getElementById('form-section').style.display = 'none'
          successEl.textContent = '✅ Password updated! You can now sign in with your new password.'
          successEl.classList.add('visible')
          setTimeout(() => window.location.href = './index.html', 3000)
        }
      } catch {
        errEl.textContent = 'Server error. Please try again.'
        errEl.classList.add('visible')
      } finally {
        btn.disabled = false
        btn.textContent = 'Update Password'
      }
    }
  </script>
</body>
</html>
